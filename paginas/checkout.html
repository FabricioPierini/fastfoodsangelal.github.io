<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>
    <main class="checkout">
        <section class="resumo">
            <h2>Resumo do pedido</h2>
            <p>Confira seus daos antes de enviar o pedido</p>

            <div id="lista-checkout">
            </div>

            <hr>
            <div class="totais">
                <p>Subtotal <span id="subtotal-checkout">R$ 0,00</span></p>
                <p>Entrega <span>?</span></p>
                <h3>Total <span id="total-checkout">R$ 0,00</span></h3>
            </div>
        </section>

        <section class="dados">
            <h2>Dados para a entrega</h2>

            <label for="nome">Nome completo</label>
            <input type="text" id="nome" required>

            <label for="telefone">telefone</label>
            <input type="tel" id="telefone">

            <label for="cep">CEP</label>
            <input type="text" id="cep">

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco">

            <label for="numero">Número</label>
            <input type="text" id="numero">

            <label for="complemento">Complemento</label>
            <input type="text" id="complemento">

            <label for="pagamento">Forma de pagamento</label>
            <select name="" id="pagamento">
                <option value="pix">Pix</option>
                <option value="dinheiro">Dinheiro</option>
                <option value="cartao">Cartão</option>
            </select>

            <label for="observacoes">Observações</label>
            <textarea id="observacoes" rows="4" placeholder="Ex: entregar na portaria..."></textarea>

        </section>

        <button id="finalizar-pedido">Finalizar pedido pelo WhatsApp</button>
        <p>Confira seus daos antes de enviar o pedido</p>
    </main>
</body>
</html>
